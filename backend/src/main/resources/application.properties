spring.application.name=finance-tracker
spring.config.import=optional:file:.env[.properties],optional:file:./backend/.env[.properties]
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQLUSER}
spring.datasource.password=${MYSQLPASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.data-source-properties.createDatabaseIfNotExist=true

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
app.jwt.secret=${JWT_SECRET:finance-tracker-local-development-secret-change-in-production-2026}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.seed.enabled=${APP_SEED_ENABLED:true}
